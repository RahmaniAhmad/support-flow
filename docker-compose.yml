services:
  postgres:
    image: postgres:17

    environment:
      POSTGRES_USER: supportflow
      POSTGRES_PASSWORD: supportflow
      POSTGRES_DB: supportflow

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: supportflow_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
